<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symmetry Span Task</title>

  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-call-function@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.4"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">

  <style>
    body { background: #fff; }
    .jspsych-content { max-width: 820px; width: 100%; }

    /* Instructions */
    .instr { max-width: 680px; margin: 0 auto; line-height: 1.8; font-size: 1.05em; color: #222; }
    .instr h2 { color: #1a237e; margin-bottom: 14px; }
    .instr p  { margin: 10px 0; }
    .key { display: inline-block; background: #eee; border: 1px solid #aaa;
           border-radius: 4px; padding: 1px 8px; font-family: monospace; font-weight: bold; }

    /* Symmetry pattern — 8×8 */
    .symm-grid { display: grid; grid-template-columns: repeat(8, 46px);
                 gap: 3px; margin: 18px auto; width: fit-content; }
    .symm-cell { width: 46px; height: 46px; border: 1px solid #bbb; border-radius: 2px; }
    .symm-cell.filled { background: #333; }
    .symm-cell.empty  { background: #f0f0f0; }
    .symm-keys { text-align: center; font-size: 1em; color: #666; margin-bottom: 10px; }

    /* Timer bar */
    .timer-wrap { width: 380px; height: 16px; background: #ddd;
                  border-radius: 8px; margin: 12px auto; overflow: hidden; }
    .timer-fill { height: 100%; background: #43a047; border-radius: 8px; }

    /* Memory grid — 4×4 */
    .mem-grid { display: grid; grid-template-columns: repeat(4, 72px);
                gap: 5px; margin: 24px auto; width: fit-content; }
    .mem-cell { width: 72px; height: 72px; border: 2px solid #999; border-radius: 5px;
                background: #e0e0e0; }
    .mem-cell.target { background: #e53935; border-color: #b71c1c; }

    /* Recall grid — 4×4 clickable */
    .recall-wrap   { text-align: center; }
    .recall-instr  { font-size: 1.1em; color: #333; margin-bottom: 10px; }
    .recall-grid-4 { display: grid; grid-template-columns: repeat(4, 80px);
                     gap: 6px; margin: 14px auto; width: fit-content; }
    .rc-cell { width: 80px; height: 80px; border: 2px solid #777; border-radius: 6px;
               background: #f4f4f4; cursor: pointer; font-size: 1.6em; font-weight: bold;
               display: flex; align-items: center; justify-content: center;
               color: #fff; transition: background 0.1s; }
    .rc-cell:hover:not(.picked) { background: #ddd; }
    .rc-cell.picked { background: #1565c0; border-color: #0d47a1; }
    .recall-seq-spatial { font-size: 0.95em; min-height: 1.8em; color: #555; margin: 8px 0; }
    .recall-actions { display: flex; justify-content: center; gap: 18px; margin-top: 14px; }
    .btn-clear  { font-size: 1.05em; padding: 11px 30px; border-radius: 8px;
                  border: 2px solid #999; background: #ffe082; cursor: pointer; }
    .btn-submit { font-size: 1.05em; padding: 11px 30px; border-radius: 8px;
                  border: 2px solid #2e7d32; background: #43a047; color: #fff; cursor: pointer; }

    /* Feedback */
    .fb-correct { color: #2e7d32; font-size: 2.2em; font-weight: bold; text-align: center; }
    .fb-wrong   { color: #b71c1c; font-size: 2.2em; font-weight: bold; text-align: center; }
    .fb-slow    { color: #e65100; font-size: 1.7em; font-weight: bold; text-align: center; }

    /* Progress */
    .progress-note { font-size: 0.88em; color: #888; text-align: center; margin-bottom: 4px; }

    /* Example symmetry illustration */
    .symm-example { display: flex; align-items: center; justify-content: center;
                    gap: 30px; margin: 16px 0; }
    .symm-label { font-size: 0.95em; color: #555; text-align: center; margin-top: 6px; }
  </style>
</head>
<body>
<script>
// ================================================================
//  SYMMETRY SPAN TASK
//  Based on: Kane et al. (2004); Unsworth et al. (2005)
//  Standard version — set sizes 2-5, 3 trials each (36 items max)
// ================================================================

const PIPE_ID    = '9oKz50mNsN8g';
const LETTER_MS  = 1000;   // spatial cell display duration
const FIXATION_MS = 250;
const FEEDBACK_MS = 600;
const SYMM_PRACTICE_N = 12;  // standalone symmetry trials for time-limit calibration

// Standard SymSpan: 3 trials × set sizes 2–5
const MAIN_SIZES = shuffle([2,2,2, 3,3,3, 4,4,4, 5,5,5]);

// --- STATE ---
let practiceRTs     = [];
let symmTimeLimit   = 8000;
let practiceCorrect = 0;
let lastSymmOK      = false;
let lastSymmSlow    = false;
let finalPartial    = 0;
let finalAbsolute   = 0;
let finalSymmAcc    = 0;


// ================================================================
//  UTILITY FUNCTIONS
// ================================================================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/** Pick n unique grid cells from a 4×4 grid (no repeats within set) */
function pickCells(n) {
  const all = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 4; c++)
      all.push([r, c]);
  return shuffle(all).slice(0, n);
}

/**
 * Generate an 8×8 symmetry pattern.
 * Vertically symmetric = left half mirrors right half.
 * Asymmetric patterns have 2–4 cells flipped on the right side.
 */
function makePattern(isSymmetric) {
  const grid = [];
  for (let r = 0; r < 8; r++) {
    const row = [];
    // Fill left four columns randomly
    for (let c = 0; c < 4; c++) {
      row.push(Math.random() > 0.5 ? 1 : 0);
    }
    // Mirror to right four columns (col c mirrors col 7-c)
    // i.e. right col 4 = left col 3, col 5 = left col 2, etc.
    for (let c = 0; c < 4; c++) {
      row.push(row[3 - c]);
    }
    grid.push(row);
  }

  if (!isSymmetric) {
    // Break symmetry: flip 2–4 distinct cells on the right half
    const numFlips = Math.floor(Math.random() * 3) + 2;
    const done = new Set();
    let tries = 0;
    while (done.size < numFlips && tries < 60) {
      const r   = Math.floor(Math.random() * 8);
      const c   = Math.floor(Math.random() * 4) + 4;
      const key = `${r},${c}`;
      if (!done.has(key)) {
        grid[r][c] = 1 - grid[r][c];
        done.add(key);
      }
      tries++;
    }
  }

  // Ensure at least 10 cells are filled (avoid trivially empty grids)
  const total = grid.flat().reduce((a, b) => a + b, 0);
  if (total < 10) {
    // Fill a few more cells on the left and mirror
    for (let r = 0; r < 8 && grid.flat().reduce((a,b)=>a+b,0) < 14; r++) {
      if (!grid[r][1]) { grid[r][1] = 1; grid[r][6] = 1; }
    }
  }

  return grid;
}

/** Render 8×8 grid as HTML */
function symmGridHTML(grid) {
  let html = '<div class="symm-grid">';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      html += `<div class="symm-cell ${grid[r][c] ? 'filled' : 'empty'}"></div>`;
    }
  }
  html += '</div>';
  return html;
}

/** Render 4×4 memory grid with one cell highlighted */
function memGridHTML(targetR, targetC) {
  let html = '<div class="mem-grid">';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const cls = (r === targetR && c === targetC) ? 'mem-cell target' : 'mem-cell';
      html += `<div class="${cls}"></div>`;
    }
  }
  html += '</div>';
  return html;
}

/** Recall grid HTML */
function recallGridHTML(n) {
  let html = `<div class="recall-wrap">
    <p class="recall-instr">
      Click the squares <strong>in the order they appeared</strong>
      &nbsp;(${n} square${n > 1 ? 's' : ''} needed):
    </p>
    <div class="recall-grid-4">`;
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      html += `<div class="rc-cell" id="rc-${r}-${c}" data-r="${r}" data-c="${c}"></div>`;
    }
  }
  html += `</div>
    <div class="recall-seq-spatial" id="recall-seq">&nbsp;</div>
    <div class="recall-actions">
      <button class="btn-clear"  id="rc-clear">Clear</button>
      <button class="btn-submit" id="rc-submit">Submit</button>
    </div>
  </div>`;
  return html;
}

/** Wire up recall grid click handlers */
function setupSpatialRecall(targets) {
  // targets: array of [row, col] pairs in presentation order
  let picked = [];

  document.querySelectorAll('.rc-cell').forEach(cell => {
    cell.addEventListener('click', function () {
      if (picked.length < targets.length && !this.classList.contains('picked')) {
        const r = parseInt(this.dataset.r);
        const c = parseInt(this.dataset.c);
        picked.push([r, c]);
        this.classList.add('picked');
        this.textContent = picked.length;
        const seqEl = document.getElementById('recall-seq');
        if (seqEl) seqEl.textContent =
          'Selected: ' + picked.map(([row, col]) => `R${row+1}C${col+1}`).join(' → ');
      }
    });
  });

  document.getElementById('rc-clear').addEventListener('click', () => {
    picked = [];
    document.querySelectorAll('.rc-cell').forEach(cell => {
      cell.classList.remove('picked');
      cell.textContent = '';
    });
    document.getElementById('recall-seq').innerHTML = '&nbsp;';
  });

  document.getElementById('rc-submit').addEventListener('click', () => {
    let partial = 0;
    for (let i = 0; i < targets.length; i++) {
      if (picked[i] && picked[i][0] === targets[i][0] && picked[i][1] === targets[i][1]) {
        partial++;
      }
    }
    const absolute = JSON.stringify(picked) === JSON.stringify(targets) ? 1 : 0;

    jsPsych.finishTrial({
      response:         JSON.stringify(picked),
      target:           JSON.stringify(targets),
      partial_correct:  partial,
      absolute_correct: absolute,
      set_size:         targets.length,
      trial_type:       'recall'
    });
  });
}

function symmFeedbackHTML() {
  if (lastSymmSlow) return `<p class="fb-slow">Too slow!</p>`;
  return lastSymmOK
    ? `<p class="fb-correct">✓ Correct</p>`
    : `<p class="fb-wrong">✗ Incorrect</p>`;
}

function startTimerBar() {
  const bar = document.getElementById('t-bar');
  if (!bar) return;
  bar.style.transition = `width ${symmTimeLimit}ms linear`;
  setTimeout(() => { if (bar) bar.style.width = '0%'; }, 30);
}


// ================================================================
//  INIT JSPSYCH
// ================================================================
const jsPsych = initJsPsych({
  on_finish: function () {
    document.body.innerHTML = `
      <div style="font-family:Arial;text-align:center;padding:80px;">
        <h2>Task complete</h2>
        <p>Your data has been saved to OSF. Thank you for participating.</p>
        <p>You may close this window.</p>
      </div>`;
  }
});

const timeline = [];
const filename = jsPsych.randomization.randomID(10) + '.csv';


// ================================================================
//  PARTICIPANT ID
// ================================================================
timeline.push({
  type: jsPsychSurveyText,
  questions: [{
    prompt:   'Please enter your Participant ID:',
    name:     'pid',
    required: true
  }],
  on_finish: d => jsPsych.data.addProperties({ participant_id: d.response.pid })
});


// ================================================================
//  PART 1 — SYMMETRY PRACTICE ALONE
// ================================================================
timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="instr">
    <h2>Part 1: Symmetry Practice</h2>
    <p>You will see an 8×8 grid of black and white squares.
       Your task is to decide whether the pattern is
       <strong>vertically symmetric</strong> — that is, whether
       the left side is a mirror image of the right side.</p>
    <p>Examples:</p>
    <p>
      <strong>Symmetric</strong> — left and right halves are mirror images.<br>
      <strong>Not symmetric</strong> — left and right halves are different.
    </p>
    <p><span class="key">F</span> = NOT symmetric &nbsp;&nbsp;
       <span class="key">J</span> = Symmetric</p>
    <p>Try to be as <strong>fast and accurate</strong> as possible.
       You will complete ${SYMM_PRACTICE_N} practice patterns.</p>
    <br><p style="color:#888">Press any key to begin.</p>
  </div>`,
  choices: 'ALL_KEYS'
});

for (let i = 0; i < SYMM_PRACTICE_N; i++) {
  const isSymm = Math.random() > 0.5;
  const pattern = makePattern(isSymm);

  timeline.push({
    type:     jsPsychHtmlKeyboardResponse,
    stimulus: `
      ${symmGridHTML(pattern)}
      <p class="symm-keys">
        <span class="key">F</span> NOT symmetric &nbsp;&nbsp;
        <span class="key">J</span> Symmetric
      </p>`,
    choices:  ['f', 'j'],
    data:     { trial_type: 'symm_practice', correct_key: isSymm ? 'j' : 'f', is_symmetric: isSymm },
    on_finish: function (d) {
      d.symm_correct = d.response === d.correct_key;
      lastSymmOK   = d.symm_correct;
      lastSymmSlow = false;
      if (d.symm_correct) practiceCorrect++;
      practiceRTs.push(d.rt);
    }
  });

  timeline.push({
    type:           jsPsychHtmlKeyboardResponse,
    stimulus:       () => symmFeedbackHTML(),
    choices:        'NO_KEYS',
    trial_duration: FEEDBACK_MS
  });
}

// Compute individual time limit
timeline.push({
  type: jsPsychCallFunction,
  func: function () {
    const n    = practiceRTs.length;
    const mean = practiceRTs.reduce((a, b) => a + b, 0) / n;
    const sd   = Math.sqrt(practiceRTs.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b, 0) / n);
    symmTimeLimit = Math.round(Math.max(2500, Math.min(12000, mean + 2.5 * sd)));
  }
});

timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: function () {
    const acc = Math.round((practiceCorrect / SYMM_PRACTICE_N) * 100);
    const msg = acc < 85
      ? `<p style="color:#b71c1c;font-weight:bold;">
           Your accuracy was ${acc}%. Please try to be more careful —
           aim for at least <strong>85%</strong> accuracy.</p>`
      : `<p style="color:#2e7d32;font-weight:bold;">
           Your accuracy was ${acc}% — great job!</p>`;
    return `<div class="instr">
      <h2>Symmetry Practice Complete</h2>${msg}
      <p>In the main task, each symmetry pattern will have a time limit
         based on your practice speed. A timer bar will show how much time you have.</p>
      <br><p style="color:#888">Press any key to continue.</p>
    </div>`;
  },
  choices: 'ALL_KEYS'
});


// ================================================================
//  PART 2 — SPATIAL MEMORY PRACTICE
// ================================================================
timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="instr">
    <h2>Part 2: Spatial Memory Practice</h2>
    <p>Next, you will practice remembering locations in a 4×4 grid.</p>
    <p>A red square will appear briefly in one cell of the grid.
       Remember <strong>which cell</strong> it was in.</p>
    <p>After all the squares in a set, a blank grid will appear.
       Click the cells in the <strong>order they appeared</strong>.</p>
    <p>You will practice with 3 sets of 2 locations each.</p>
    <br><p style="color:#888">Press any key to begin.</p>
  </div>`,
  choices: 'ALL_KEYS'
});

for (let s = 0; s < 3; s++) {
  const cells   = pickCells(2);
  const tCells  = cells.map(c => [...c]); // deep copy for closure

  cells.forEach(([r, c]) => {
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       memGridHTML(r, c),
      choices:        'NO_KEYS',
      trial_duration: LETTER_MS,
      data:           { trial_type: 'cell_practice' }
    });
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       '<div style="height:80px"></div>',
      choices:        'NO_KEYS',
      trial_duration: FIXATION_MS
    });
  });

  timeline.push({
    type:    jsPsychHtmlKeyboardResponse,
    stimulus: recallGridHTML(2),
    choices: 'NO_KEYS',
    on_load: () => setupSpatialRecall(tCells),
    data:    { trial_type: 'recall_practice', target: JSON.stringify(tCells) }
  });

  timeline.push({
    type:           jsPsychHtmlKeyboardResponse,
    stimulus: function () {
      const last = jsPsych.data.get().filter({ trial_type: 'recall_practice' }).last(1).values()[0];
      if (!last) return '';
      return last.partial_correct === 2
        ? `<p class="fb-correct">Both correct!</p>`
        : `<p style="font-size:1.2em;text-align:center;color:#555">
             You got ${last.partial_correct}/2 correct.</p>`;
    },
    choices:        'NO_KEYS',
    trial_duration: 2000
  });
}


// ================================================================
//  PART 3 — COMBINED PRACTICE
// ================================================================
timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="instr">
    <h2>Part 3: Combined Practice</h2>
    <p>Now you will do both tasks together.</p>
    <p>You will see a symmetry pattern — judge it as quickly as you can,
       then a red square will appear in the grid — remember its location.</p>
    <p>After all items, click the grid squares in the <strong>order they appeared</strong>.</p>
    <p>The symmetry patterns have a <strong>time limit</strong>. Answer quickly!
       You must maintain at least <strong>85% accuracy</strong> on symmetry judgments.</p>
    <br><p style="color:#888">Press any key to begin.</p>
  </div>`,
  choices: 'ALL_KEYS'
});

[2, 2, 3].forEach(sz => {
  const cells  = pickCells(sz);
  const tCells = cells.map(c => [...c]);

  for (let i = 0; i < sz; i++) {
    const isSymm  = Math.random() > 0.5;
    const pattern = makePattern(isSymm);

    timeline.push({
      type:     jsPsychHtmlKeyboardResponse,
      stimulus: `
        ${symmGridHTML(pattern)}
        <p class="symm-keys">
          <span class="key">F</span> NOT symmetric &nbsp;&nbsp;
          <span class="key">J</span> Symmetric
        </p>
        <div class="timer-wrap"><div class="timer-fill" id="t-bar" style="width:100%"></div></div>`,
      choices:  ['f', 'j'],
      on_start: trial => { trial.trial_duration = symmTimeLimit; },
      on_load:  startTimerBar,
      data:     { trial_type: 'symm_combined_practice', correct_key: isSymm ? 'j' : 'f' },
      on_finish: function (d) {
        lastSymmSlow = d.response === null;
        lastSymmOK   = !lastSymmSlow && d.response === d.correct_key;
        d.symm_correct = lastSymmOK;
        d.timed_out    = lastSymmSlow;
      }
    });

    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       () => symmFeedbackHTML(),
      choices:        'NO_KEYS',
      trial_duration: FEEDBACK_MS
    });

    const [cr, cc] = cells[i];
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       memGridHTML(cr, cc),
      choices:        'NO_KEYS',
      trial_duration: LETTER_MS,
      data:           { trial_type: 'cell_combined_practice' }
    });
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       '<div style="height:80px"></div>',
      choices:        'NO_KEYS',
      trial_duration: FIXATION_MS
    });
  }

  timeline.push({
    type:    jsPsychHtmlKeyboardResponse,
    stimulus: recallGridHTML(sz),
    choices: 'NO_KEYS',
    on_load: () => setupSpatialRecall(tCells),
    data:    { trial_type: 'recall_combined_practice', target: JSON.stringify(tCells) }
  });
});


// ================================================================
//  MAIN TASK
// ================================================================
timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="instr">
    <h2>Main Task — Begin</h2>
    <p>You are now ready for the main task.</p>
    <p>You will complete <strong>12 sets</strong>, each containing 2 to 5 items.</p>
    <p>Remember:</p>
    <p>• Judge each symmetry pattern as quickly and accurately as possible</p>
    <p>• Memorise the location of each red square in order</p>
    <p>• When prompted, click the grid squares in the order they appeared</p>
    <p>• Keep your symmetry accuracy above 85%</p>
    <br><p style="color:#888">Press any key to begin.</p>
  </div>`,
  choices: 'ALL_KEYS'
});

MAIN_SIZES.forEach((sz, setIdx) => {
  const cells  = pickCells(sz);
  const tCells = cells.map(c => [...c]);

  for (let i = 0; i < sz; i++) {
    const isSymm  = Math.random() > 0.5;
    const pattern = makePattern(isSymm);

    timeline.push({
      type:     jsPsychHtmlKeyboardResponse,
      stimulus: `
        <p class="progress-note">Set ${setIdx + 1} of 12 &nbsp;·&nbsp; item ${i + 1} of ${sz}</p>
        ${symmGridHTML(pattern)}
        <p class="symm-keys">
          <span class="key">F</span> NOT symmetric &nbsp;&nbsp;
          <span class="key">J</span> Symmetric
        </p>
        <div class="timer-wrap"><div class="timer-fill" id="t-bar" style="width:100%"></div></div>`,
      choices:  ['f', 'j'],
      on_start: trial => { trial.trial_duration = symmTimeLimit; },
      on_load:  startTimerBar,
      data: {
        trial_type:   'symm_main',
        correct_key:  isSymm ? 'j' : 'f',
        is_symmetric: isSymm,
        set_index:    setIdx,
        item_index:   i,
        set_size:     sz
      },
      on_finish: function (d) {
        lastSymmSlow   = d.response === null;
        lastSymmOK     = !lastSymmSlow && d.response === d.correct_key;
        d.symm_correct = lastSymmOK;
        d.timed_out    = lastSymmSlow;
      }
    });

    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       () => symmFeedbackHTML(),
      choices:        'NO_KEYS',
      trial_duration: FEEDBACK_MS
    });

    const [cr, cc] = cells[i];
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       memGridHTML(cr, cc),
      choices:        'NO_KEYS',
      trial_duration: LETTER_MS,
      data: {
        trial_type: 'cell_main',
        cell_row:   cr,
        cell_col:   cc,
        set_index:  setIdx,
        item_index: i,
        set_size:   sz
      }
    });
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       '<div style="height:80px"></div>',
      choices:        'NO_KEYS',
      trial_duration: FIXATION_MS
    });
  }

  timeline.push({
    type:    jsPsychHtmlKeyboardResponse,
    stimulus: recallGridHTML(sz),
    choices: 'NO_KEYS',
    on_load: () => setupSpatialRecall(tCells),
    data:    {
      trial_type: 'recall_main',
      target:     JSON.stringify(tCells),
      set_size:   sz,
      set_index:  setIdx
    }
  });
});


// ================================================================
//  COMPUTE SCORES
// ================================================================
timeline.push({
  type: jsPsychCallFunction,
  func: function () {
    const recallTrials = jsPsych.data.get().filter({ trial_type: 'recall_main' }).values();
    const symmTrials   = jsPsych.data.get().filter({ trial_type: 'symm_main'   }).values();

    finalPartial  = recallTrials.reduce((s, d) => s + (d.partial_correct  || 0), 0);
    finalAbsolute = recallTrials.reduce((s, d) => s + (d.absolute_correct || 0), 0);
    finalSymmAcc  = symmTrials.length > 0
      ? Math.round((symmTrials.filter(d => d.symm_correct).length / symmTrials.length) * 100)
      : 0;
  },
  on_finish: function (d) {
    d.trial_type          = 'summary';
    d.partial_span_score  = finalPartial;
    d.absolute_span_score = finalAbsolute;
    d.symm_accuracy_main  = finalSymmAcc;
  }
});


// ================================================================
//  END SCREEN
// ================================================================
timeline.push({
  type:           jsPsychHtmlKeyboardResponse,
  stimulus: function () {
    return `<div class="instr" style="text-align:center;">
      <h2>Task Complete!</h2>
      <p>Thank you for participating.</p>
      <p style="margin-top:18px;">
        <strong>Symmetry accuracy (main task):</strong> ${finalSymmAcc}%
      </p>
      <p style="color:#888;font-size:0.95em;margin-top:16px;">Saving your data&hellip;</p>
    </div>`;
  },
  choices:        'NO_KEYS',
  trial_duration: 2500
});


// ================================================================
//  SAVE VIA DATAPIPE → OSF
// ================================================================
timeline.push({
  type:          jsPsychPipe,
  action:        'save',
  experiment_id: PIPE_ID,
  filename:      filename,
  data_string:   () => jsPsych.data.get().csv()
});


// ================================================================
//  RUN
// ================================================================
jsPsych.run(timeline);
</script>
</body>
</html>
