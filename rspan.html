    body { background: #fff; }

    .rl-btn.picked { background: #1565c0; color: #fff; border-color: #0d47a1; }
    .rl-btn:disabled { opacity: 0.45; cursor: default; }
    .recall-seq { font-size: 1.5em; font-weight: bold; letter-spacing: 0.4em;
                  min-height: 2em; color: #333; margin: 8px 0; }
    .recall-actions { display: flex; justify-content: center; gap: 18px; margin-top: 14px; }
    .btn-clear  { font-size: 1.05em; padding: 11px 30px; border-radius: 8px;
                  border: 2px solid #999; background: #ffe082; cursor: pointer; }
    .btn-submit { font-size: 1.05em; padding: 11px 30px; border-radius: 8px;
                  border: 2px solid #2e7d32; background: #43a047; color: #fff; cursor: pointer; }

    .fb-wrong   { color: #b71c1c; font-size: 2.2em; font-weight: bold; text-align: center; }
    .fb-slow    { color: #e65100; font-size: 1.7em; font-weight: bold; text-align: center; }

    /* Progress */
    .progress-note { font-size: 0.88em; color: #888; text-align: center; margin-bottom: 6px; }
  </style>
</head>
<body>
<script>
// ================================================================
//  READING SPAN TASK
//  Based on: Unsworth, Heitz, Schrock, & Engle (2005)
//  Standard version — set sizes 3-7, 3 trials each (75 items max)
// ================================================================

const PIPE_ID     = '9oKz50mNsN8g';
const LETTERS     = ['F','H','J','K','L','N','P','Q','R','S','T','Y'];

  "The hammer enrolled in ballet classes on Tuesday.",
  "She combed the highway before going to bed.",
  "The eraser built a nest in the tall oak tree.",

  "He ironed his cat before leaving for the airport.",

  "The elevator decided to take a vacation to the mountains.",
  "He brushed his lamp before going to sleep.",
  "The envelope jogged five miles before breakfast.",
  "She taught her stapler to play the piano.",

// ================================================================
//  UTILITY FUNCTIONS
// ================================================================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickLetters(n) {
  return shuffle(LETTERS).slice(0, n);
}

// Build a shuffled pool of balanced true/false sentences
function buildSentencePool() {
  const trueShuffled  = shuffle(TRUE_SENTENCES).map(s  => ({ text: s,  correct: true  }));
  const falseShuffled = shuffle(FALSE_SENTENCES).map(s => ({ text: s,  correct: false }));
  const pool = [];
  const maxLen = Math.max(trueShuffled.length, falseShuffled.length);
  for (let i = 0; i < maxLen; i++) {
    if (i < trueShuffled.length)  pool.push(trueShuffled[i]);
    if (i < falseShuffled.length) pool.push(falseShuffled[i]);
  }
  return shuffle(pool);
}

let sentencePool = buildSentencePool();
let sentenceIdx  = 0;

function nextSentence() {
  if (sentenceIdx >= sentencePool.length) {
    // Refill if we somehow exhaust (shouldn't happen)
    sentencePool = buildSentencePool();
    sentenceIdx  = 0;
  }
  return sentencePool[sentenceIdx++];
}

function recallHTML(n) {
  const grid = LETTERS.map(l =>
    `<button class="rl-btn" id="rl-${l}">${l}</button>`
  ).join('');
  return `
    <div class="recall-wrap">
      <p class="recall-instr">
        Select the letters <strong>in the order they appeared</strong>
        &nbsp;(${n} letter${n > 1 ? 's' : ''} needed):
      </p>
      <div class="recall-grid">${grid}</div>
      <div class="recall-seq" id="recall-seq">&nbsp;</div>
      <div class="recall-actions">
        <button class="btn-clear"  id="rc-clear">Clear</button>
        <button class="btn-submit" id="rc-submit">Submit</button>
      </div>
    </div>`;
}

function setupRecall(targets) {
  let picked = [];

  LETTERS.forEach(l => {
    document.getElementById(`rl-${l}`).addEventListener('click', function () {
      if (picked.length < targets.length && !this.disabled) {
        picked.push(l);
        this.classList.add('picked');
        this.disabled = true;
        document.getElementById('recall-seq').textContent = picked.join('  ');
      }
    });
  });

  document.getElementById('rc-clear').addEventListener('click', () => {
    picked = [];
    LETTERS.forEach(l => {
      const b = document.getElementById(`rl-${l}`);
      b.classList.remove('picked');
      b.disabled = false;
    });
    document.getElementById('recall-seq').innerHTML = '&nbsp;';
  });

  document.getElementById('rc-submit').addEventListener('click', () => {
    let partial = 0;
    for (let i = 0; i < targets.length; i++) {
      if (picked[i] === targets[i]) partial++;
    }
    const absolute = picked.join('') === targets.join('') ? 1 : 0;
    jsPsych.finishTrial({
      response:         picked.join(''),
      target:           targets.join(''),
      partial_correct:  partial,
      absolute_correct: absolute,
      set_size:         targets.length,
      trial_type:       'recall'
    });
  });
}

function sentenceTrialHTML(text, showTimer) {
  const timer = showTimer
    ? `<div class="timer-wrap"><div class="timer-fill" id="t-bar" style="width:100%"></div></div>`
    : '';
  return `
    <div class="sentence-box">${text}</div>
    <p class="sentence-keys">
      <span class="key">F</span> Does NOT make sense &nbsp;&nbsp;
      <span class="key">J</span> Makes sense
    </p>
    ${timer}`;
}

function startTimerBar() {
  const bar = document.getElementById('t-bar');
  if (!bar) return;
  bar.style.transition = `width ${sentTimeLimit}ms linear`;
  setTimeout(() => { if (bar) bar.style.width = '0%'; }, 30);
}

function sentFeedbackHTML() {
  if (lastSentSlow) return `<p class="fb-slow">Too slow!</p>`;
  return lastSentOK
    ? `<p class="fb-correct">✓ Correct</p>`
    : `<p class="fb-wrong">✗ Incorrect</p>`;
}


// ================================================================
//  INIT JSPSYCH
// ================================================================
const jsPsych = initJsPsych({
  on_finish: function () {
    document.body.innerHTML = `
      <div style="font-family:Arial;text-align:center;padding:80px;">
        <h2>Task complete</h2>
        <p>Your data has been saved to OSF. Thank you for participating.</p>
        <p>You may close this window.</p>
      </div>`;
  }
});

const timeline = [];
const filename = jsPsych.randomization.randomID(10) + '.csv';


// ================================================================
//  PARTICIPANT ID
// ================================================================
timeline.push({
  type: jsPsychSurveyText,
  questions: [{
    prompt:   'Please enter your Participant ID:',
    name:     'pid',
    required: true
  }],
  on_finish: d => jsPsych.data.addProperties({ participant_id: d.response.pid })
});


// ================================================================
//  PART 1 — SENTENCE PRACTICE ALONE
// ================================================================
timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="instr">
    <h2>Part 1: Sentence Practice</h2>
    <p>You will read a sentence and decide whether it <strong>makes sense</strong>.</p>
    <p>Example of a sentence that makes sense:<br>
       <em>"The dog chased the cat around the yard."</em></p>
    <p>Example of a sentence that does NOT make sense:<br>
       <em>"The bicycle ate a large piece of pizza."</em></p>
    <p><span class="key">F</span> = Does NOT make sense &nbsp;&nbsp;
       <span class="key">J</span> = Makes sense</p>
    <p>Try to be as <strong>fast and accurate</strong> as possible.
       You will read 15 practice sentences.</p>
    <br><p style="color:#888">Press any key to begin.</p>
  </div>`,
  choices: 'ALL_KEYS'
});

for (let i = 0; i < 15; i++) {
  const sent = nextSentence();
  timeline.push({
    type:     jsPsychHtmlKeyboardResponse,
    stimulus: sentenceTrialHTML(sent.text, false),
    choices:  ['f', 'j'],
    data:     { trial_type: 'sent_practice', correct_key: sent.correct ? 'j' : 'f', makes_sense: sent.correct },
    on_finish: function (d) {
      d.sent_correct = d.response === d.correct_key;
      lastSentOK   = d.sent_correct;
      lastSentSlow = false;
      if (d.sent_correct) practiceCorrect++;
      practiceRTs.push(d.rt);
    }
  });
  timeline.push({
    type:           jsPsychHtmlKeyboardResponse,
    stimulus:       () => sentFeedbackHTML(),
    choices:        'NO_KEYS',
    trial_duration: FEEDBACK_MS
  });
}

// Compute individual time limit
timeline.push({
  type: jsPsychCallFunction,
  func: function () {
    const n    = practiceRTs.length;
    const mean = practiceRTs.reduce((a, b) => a + b, 0) / n;
    const sd   = Math.sqrt(practiceRTs.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b, 0) / n);
    sentTimeLimit = Math.round(Math.max(2500, Math.min(12000, mean + 2.5 * sd)));
  }
});

timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: function () {
    const acc = Math.round((practiceCorrect / 15) * 100);
    const msg = acc < 85
      ? `<p style="color:#b71c1c;font-weight:bold;">
           Your accuracy was ${acc}%. Please try to be more careful —
           you need at least <strong>85%</strong> accuracy on the sentences.</p>`
      : `<p style="color:#2e7d32;font-weight:bold;">
           Your accuracy was ${acc}% — great job!</p>`;
    return `<div class="instr">
      <h2>Sentence Practice Complete</h2>${msg}
      <p>In the main task, each sentence will have a time limit based on your
         practice speed. A timer bar will show how much time remains.</p>
      <br><p style="color:#888">Press any key to continue.</p>
    </div>`;
  },
  choices: 'ALL_KEYS'
});


// ================================================================
//  PART 2 — LETTER PRACTICE ALONE
// ================================================================
timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="instr">
    <h2>Part 2: Letter Practice</h2>
    <p>Next, you will practice remembering letters.</p>
    <p>A letter will appear briefly on screen — try to remember it.</p>
    <p>After all the letters in a set, a grid will appear.
       Click the letters you saw <strong>in the order they appeared</strong>.</p>
    <p>You will practice with 3 sets of 3 letters each.</p>
    <br><p style="color:#888">Press any key to begin.</p>
  </div>`,
  choices: 'ALL_KEYS'
});

for (let s = 0; s < 3; s++) {
  const letters  = pickLetters(3);
  const tLetters = [...letters];

  letters.forEach(l => {
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       `<div class="letter-box">${l}</div>`,
      choices:        'NO_KEYS',
      trial_duration: LETTER_MS,
      data:           { trial_type: 'letter_practice' }
    });
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       '<div style="height:80px"></div>',
      choices:        'NO_KEYS',
      trial_duration: FIXATION_MS
    });
  });

  timeline.push({
    type:    jsPsychHtmlKeyboardResponse,
    stimulus: recallHTML(3),
    choices: 'NO_KEYS',
    on_load: () => setupRecall(tLetters),
    data:    { trial_type: 'recall_practice', target: tLetters.join('') }
  });

  timeline.push({
    type:           jsPsychHtmlKeyboardResponse,
    stimulus: function () {
      const last = jsPsych.data.get().filter({ trial_type: 'recall_practice' }).last(1).values()[0];
      if (!last) return '';
      return last.partial_correct === 3
        ? `<p class="fb-correct">All 3 correct!</p>`
        : `<p style="font-size:1.2em;text-align:center;color:#555">
             You got ${last.partial_correct}/3 correct.
             <br>Target order: <strong>${last.target}</strong></p>`;
    },
    choices:        'NO_KEYS',
    trial_duration: 2200
  });
}


// ================================================================
//  PART 3 — COMBINED PRACTICE
// ================================================================
timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="instr">
    <h2>Part 3: Combined Practice</h2>
    <p>Now you will do both together: read a sentence and judge it,
       then a letter will appear — remember it.</p>
    <p>After all items in a set, recall the letters <strong>in order</strong>.</p>
    <p>The sentences have a <strong>time limit</strong> — answer quickly!
       You must maintain at least <strong>85% accuracy</strong> on the sentences.</p>
    <br><p style="color:#888">Press any key to begin.</p>
  </div>`,
  choices: 'ALL_KEYS'
});

[2, 2, 3].forEach(sz => {
  const letters  = pickLetters(sz);
  const tLetters = [...letters];

  for (let i = 0; i < sz; i++) {
    const sent = nextSentence();

    timeline.push({
      type:     jsPsychHtmlKeyboardResponse,
      stimulus: sentenceTrialHTML(sent.text, true),
      choices:  ['f', 'j'],
      on_start: trial => { trial.trial_duration = sentTimeLimit; },
      on_load:  startTimerBar,
      data:     { trial_type: 'sent_combined_practice', correct_key: sent.correct ? 'j' : 'f' },
      on_finish: function (d) {
        lastSentSlow   = d.response === null;
        lastSentOK     = !lastSentSlow && d.response === d.correct_key;
        d.sent_correct = lastSentOK;
        d.timed_out    = lastSentSlow;
      }
    });

    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       () => sentFeedbackHTML(),
      choices:        'NO_KEYS',
      trial_duration: FEEDBACK_MS
    });

    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       `<div class="letter-box">${letters[i]}</div>`,
      choices:        'NO_KEYS',
      trial_duration: LETTER_MS,
      data:           { trial_type: 'letter_combined_practice' }
    });
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       '<div style="height:80px"></div>',
      choices:        'NO_KEYS',
      trial_duration: FIXATION_MS
    });
  }

  timeline.push({
    type:    jsPsychHtmlKeyboardResponse,
    stimulus: recallHTML(sz),
    choices: 'NO_KEYS',
    on_load: () => setupRecall(tLetters),
    data:    { trial_type: 'recall_combined_practice', target: tLetters.join('') }
  });
});


// ================================================================
//  MAIN TASK
// ================================================================
timeline.push({
  type:     jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="instr">
    <h2>Main Task — Begin</h2>
    <p>You are now ready for the main task.</p>
    <p>You will complete <strong>15 sets</strong>, each containing 3 to 7 items.</p>
    <p>Remember:</p>
    <p>• Judge each sentence as quickly and accurately as possible</p>
    <p>• Memorise each letter and its position in the sequence</p>
    <p>• When prompted, recall the letters in the order they appeared</p>
    <p>• Keep your sentence accuracy above 85%</p>
    <br><p style="color:#888">Press any key to begin.</p>
  </div>`,
  choices: 'ALL_KEYS'
});

MAIN_SIZES.forEach((sz, setIdx) => {
  const letters  = pickLetters(sz);
  const tLetters = [...letters];

  for (let i = 0; i < sz; i++) {
    const sent = nextSentence();

    timeline.push({
      type:     jsPsychHtmlKeyboardResponse,
      stimulus: `
        <p class="progress-note">Set ${setIdx + 1} of 15 &nbsp;·&nbsp; item ${i + 1} of ${sz}</p>
        ${sentenceTrialHTML(sent.text, true)}`,
      choices:  ['f', 'j'],
      on_start: trial => { trial.trial_duration = sentTimeLimit; },
      on_load:  startTimerBar,
      data: {
        trial_type:    'sent_main',
        sentence:      sent.text,
        correct_key:   sent.correct ? 'j' : 'f',
        makes_sense:   sent.correct,
        set_index:     setIdx,
        item_index:    i,
        set_size:      sz,
        target_letter: letters[i]
      },
      on_finish: function (d) {
        lastSentSlow   = d.response === null;
        lastSentOK     = !lastSentSlow && d.response === d.correct_key;
        d.sent_correct = lastSentOK;
        d.timed_out    = lastSentSlow;
      }
    });

    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       () => sentFeedbackHTML(),
      choices:        'NO_KEYS',
      trial_duration: FEEDBACK_MS
    });

    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       `<div class="letter-box">${letters[i]}</div>`,
      choices:        'NO_KEYS',
      trial_duration: LETTER_MS,
      data: {
        trial_type: 'letter_main',
        letter:     letters[i],
        set_index:  setIdx,
        item_index: i,
        set_size:   sz
      }
    });
    timeline.push({
      type:           jsPsychHtmlKeyboardResponse,
      stimulus:       '<div style="height:80px"></div>',
      choices:        'NO_KEYS',
      trial_duration: FIXATION_MS
    });
  }

  timeline.push({
    type:    jsPsychHtmlKeyboardResponse,
    stimulus: recallHTML(sz),
    choices: 'NO_KEYS',
    on_load: () => setupRecall(tLetters),
    data:    {
      trial_type: 'recall_main',
      target:     tLetters.join(''),
      set_size:   sz,
      set_index:  setIdx
    }
  });
});


// ================================================================
//  COMPUTE SCORES
// ================================================================
timeline.push({
  type: jsPsychCallFunction,
  func: function () {
    const recallTrials = jsPsych.data.get().filter({ trial_type: 'recall_main' }).values();
    const sentTrials   = jsPsych.data.get().filter({ trial_type: 'sent_main'   }).values();

    finalPartial  = recallTrials.reduce((s, d) => s + (d.partial_correct  || 0), 0);
    finalAbsolute = recallTrials.reduce((s, d) => s + (d.absolute_correct || 0), 0);
    finalSentAcc  = sentTrials.length > 0
      ? Math.round((sentTrials.filter(d => d.sent_correct).length / sentTrials.length) * 100)
      : 0;
  },
  on_finish: function (d) {
    d.trial_type          = 'summary';
    d.partial_span_score  = finalPartial;
    d.absolute_span_score = finalAbsolute;
    d.sent_accuracy_main  = finalSentAcc;
  }
});


// ================================================================
//  END SCREEN
// ================================================================
timeline.push({
  type:           jsPsychHtmlKeyboardResponse,
  stimulus: function () {
    return `<div class="instr" style="text-align:center;">
      <h2>Task Complete!</h2>
      <p>Thank you for participating.</p>
      <p style="margin-top:18px;">
        <strong>Sentence accuracy (main task):</strong> ${finalSentAcc}%
      </p>
      <p style="color:#888;font-size:0.95em;margin-top:16px;">Saving your data&hellip;</p>
    </div>`;
  },
  choices:        'NO_KEYS',
  trial_duration: 2500
});


// ================================================================
//  SAVE VIA DATAPIPE → OSF
// ================================================================
timeline.push({
  type:          jsPsychPipe,
  action:        'save',
  experiment_id: PIPE_ID,
  filename:      filename,
  data_string:   () => jsPsych.data.get().csv()
});


// ================================================================
//  RUN
// ================================================================
jsPsych.run(timeline);
</script>
</body>
</html>
